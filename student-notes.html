<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notes-dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h2>Notes</h2>
                <p>Study materials shared by your teachers</p>
            </div>

            <div class="dash-card" style="margin-bottom:16px;">
                <input type="text" id="noteSearch" placeholder="🔍 Search notes by title or subject..."
                    oninput="loadStudentNotes()"
                    style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(0,149,255,0.2);border-radius:8px;color:white;font-size:14px;outline:none;">
            </div>

            <div class="dash-card">
                <h3>Available Notes</h3>
                <div id="studentNotesList"></div>
            </div>
        </main>


        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>

    </div>

    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="student-notes.js"></script>
</body>

</html>
