<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere - Quiz Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h2>Quiz Results</h2>
                <p>View student performance in quizzes</p>
            </div>

            <div class="dash-card" id="resultClassList"></div>

            <div id="resultSection" style="display:none;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <button class="btn-outline" onclick="backToResultClasses()" style="padding:6px 16px;font-size:13px;">← Back</button>
                    <h3 id="resultClassName" style="color:white;font-size:18px;"></h3>
                </div>
                <div id="quizResultList"></div>
            </div>
        </main>

        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">E<span class="ai-highlight">S</span></button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
    </div>

    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title"><span>Edu<span class="highlight">Sphere</span> AI</span></div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg"><p>Hi! I'm EduSphere AI. How can I help you today?</p></div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="teacher-quiz-results.js"></script>
</body>
</html>
