<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere-teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>
            <main class="main-content">
              <div class="page-header">
    <h2>My Classes</h2>
    <p>All your assigned classes</p>
</div>
          <div class="page-header">
    <h2>My Classes</h2>
    <p>Create and manage your classes</p>
</div>

<div class="dash-card" style="margin-bottom: 24px;">
    <h3>Create New Class</h3>
    <div class="input-group">
        <label>Class Name</label>
        <input type="text" id="class-name" placeholder="e.g. CSE Section A">
    </div>
    <div class="input-group">
        <label>Subject</label>
        <input type="text" id="class-subject" placeholder="e.g. Data Structures">
    </div>
    <button class="btn-primary" onclick="createClass()">Create Class</button>
</div>

<div class="dash-card">
    <h3>Your Classes</h3>
    <div id="classList">
        <div class="empty-state">
            <p>No classes created yet.</p>
        </div>
    </div>
</div>

            </main>
            <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
            </div>
    <script src="sidebar.js"></script>
<script src="dashboard.js"></script>
<script src="teacher-class.js"></script>
</body>
</html>
