<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere - Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            
            <!-- SEARCH BAR -->
            <div class="feed-search">
    <input type="text" id="feedSearch" placeholder="🔍 Search people in your classes..." 
    oninput="searchPeople()"/>
</div>
<div id="searchResults" class="dash-card" style="display:none;margin-bottom:16px;"></div>

            <!-- CREATE POST -->
<div class="create-post">
    <div class="post-avatar" id="feedAvatar">👤</div>
    <div class="post-input-wrap">
        <textarea id="postText" placeholder="Share something with your network..."></textarea>
        <div class="post-actions">
            <button class="post-img-btn" onclick="document.getElementById('postImageInput').click()">📷 Photo</button>
            <input type="file" id="postImageInput" accept="image/*" style="display:none">
            <button class="btn-primary post-btn" onclick="createPost()">Post</button>
        </div>
    </div>
</div>

<!-- FEED -->
<div class="feed-posts" id="feedPosts">
</div>

        </main>

        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
    </div>

    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="feed.js"></script>
</body>
</html>
