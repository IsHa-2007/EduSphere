<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere - Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            
            <!-- SEARCH BAR -->
            <div class="feed-search">
                <input type="text" placeholder="🔍 Search people, posts, colleges..." />
            </div>

            <!-- CREATE POST -->
            <div class="create-post">
                <div class="post-avatar">👤</div>
                <div class="post-input-wrap">
                    <textarea placeholder="Share something with your network..."></textarea>
                    <div class="post-actions">
                        <button class="post-img-btn">📷 Photo</button>
                        <button class="btn-primary post-btn">Post</button>
                    </div>
                </div>
            </div>

            <!-- FEED -->
            <div class="feed-posts">
                <div class="empty-state" style="min-height: 200px;">
                    <p>No posts yet. Be the first to post!</p>
                </div>
            </div>

        </main>

        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
    </div>

    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
