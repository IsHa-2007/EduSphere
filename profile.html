<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere-profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
      <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
        <div class="profile-cover"></div>

        <div class="profile-info">
            <div class="profile-avtar">👤</div>
            <div class="user-detail">
                <h2 id="profile-name"></h2>
                <p id="profile-role"></p>
                <p id="profile-institution-display"></p>
                <p id="profile-bio-display"></p>
                <p id="profile-skills-display"></p>
                
                <button class="btn-outline" style="margin-top:12px; padding:6px 16px; font-size:12px;" onclick="enableEdit()">Edit Profile</button>

                <div id="edit-form" style="display:none; margin-top:12px;">
                    <input type="text" id="bio-input" placeholder="Add a bio..." />
                    <input type="text" id="skill-input" placeholder="Add skills..." />
                    <input type="text" id="institution-input" placeholder="Add institution..." />
                    <button class="btn-outline" style="margin-top:8px; padding:6px 16px; font-size:12px;" onclick="saveProfile()">Save</button>
                </div>
            </div>
        </div>
        <div class="profile-posts">
            <h3>Posts</h3>
            <div class="empty-state">
                <p>Make your first post</p>
            </div>
        </div>
        </main>
        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
    </div>
    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
  
  <script src="sidebar.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
</body>
</html>
