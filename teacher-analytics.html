<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere-teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h2>Analytics</h2>
                <p>Monitor student performance across your classes</p>
            </div>

            <div class="dash-card" id="analyticsClassList"></div>

            <div id="analyticsSection" style="display:none;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <button class="btn-outline" onclick="backToAnalyticsClasses()"
                        style="padding:6px 16px;font-size:13px;">← Back</button>
                    <h3 id="analyticsClassName" style="color:white;font-size:18px;"></h3>
                </div>

                <div class="dash-card" style="margin-bottom:16px;">
                    <div style="display:flex;gap:24px;font-size:13px;">
                        <span>🔴 Red — Low attendance or poor performance</span>
                        <span>🟡 Yellow — Average</span>
                        <span>🟢 Green — Good performance</span>
                    </div>
                </div>

                <div class="dash-card">
                    <h3>Students</h3>
                    <div id="studentAnalyticsList"></div>
                </div>
            </div>
        </main>
        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>
        <div class="ai-chat-popup" id="aiChat">
            <div class="chat-header">
                <div class="chat-title">
                    <span>Edu<span class="highlight">Sphere</span> AI</span>
                </div>
                <button class="chat-close" onclick="toggleChat()">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg ai-msg">
                    <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
                </div>
            </div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Ask anything..." />
                <button class="chat-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="teacher-analytics.js"></script>
</body>

</html>
