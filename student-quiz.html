<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz-dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h2>Quizzes</h2>
                <p>Attempt quizzes for your enrolled classes</p>
            </div>

            <!-- CLASS LIST -->
            <div class="dash-card" id="studentQuizClassList"></div>

            <!-- QUIZ LIST FOR CLASS -->
            <div id="studentQuizSection" style="display:none;">
                <input type="hidden" id="currentClassCode">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <button class="btn-outline" onclick="backToQuizClasses()" style="padding:6px 16px;font-size:13px;">←
                        Back</button>
                    <h3 id="selectedQuizClass" style="color:white;font-size:18px;"></h3>
                </div>
                <div class="dash-card">
                    <h3>Available Quizzes</h3>
                    <div id="quizList"></div>
                </div>
            </div>

            <!-- QUIZ ATTEMPT -->
            <div id="quizAttemptSection" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <div>
                        <h2 id="attemptQuizTitle" style="color:white;font-size:20px;"></h2>
                        <p id="attemptQuizSubject" style="color:#aaaaaa;font-size:13px;margin-top:4px;"></p>
                    </div>
                    <div class="timer-box">
                        <p style="font-size:11px;color:#aaaaaa;margin-bottom:4px;">Time Remaining</p>
                        <h2 id="timerDisplay" style="color:#0095ff;font-size:28px;font-weight:700;">00:00</h2>
                    </div>
                </div>

                <div id="attemptQuestions"></div>

                <button class="btn-primary btn-full" style="margin-top:24px;" onclick="submitQuiz()">Submit
                    Quiz</button>
            </div>
        </main>


        <div class="ai-float" onclick="toggleChat()">
            <button class="ai-float-btn">
                E<span class="ai-highlight">S</span>
            </button>
            <span class="ai-float-label">AI Assistant</span>
        </div>

    </div>

    <div class="ai-chat-popup" id="aiChat">
        <div class="chat-header">
            <div class="chat-title">
                <span>Edu<span class="highlight">Sphere</span> AI</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg ai-msg">
                <p>Hi! I'm EduSphere AI. I'll be fully functional soon. How can I help you today?</p>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." />
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="student-quiz.js"></script>
</body>

</html>
